<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        body{
            margin:0;
            padding:0;
            background:#0f172a;
            font-family:Arial;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:350px;
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
        }

        h1{
            color:white;
            text-align:center;
        }

        input{
            width:100%;
            padding:15px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            background:#334155;
            color:white;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        p{
            color:white;
            text-align:center;
            margin-top:20px;
        }

        a{
            color:#38bdf8;
            text-decoration:none;
        }

    </style>

</head>
<body>

    <div class="card">

        <h1>Login</h1>

    

        <form method="POST">

            {% csrf_token %}

            <input type="email" name="email" placeholder="Email">

            <input type="password" name="password" placeholder="Password">

            <button type="submit">Login</button>

        </form>

        <p>
            Don't have account?
            <a href="/register/">Create Account</a>
        </p>

    </div>

</body>
</html>
